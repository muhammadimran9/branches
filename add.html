<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Your Business Free | List Company in Pakistan | PakBizBranches</title>
    <meta name="description" content="List your company FREE on Pakistan's #1 directory. Instant visibility, reach millions. Add restaurants, shops, services. No credit card needed.">
    <meta name="keywords" content="add business Pakistan, list business free Pakistan, business registration Pakistan, promote business online, free business listing, advertise business Pakistan">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pakbizbranches.online/add.html">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <meta property="og:title" content="Add Your Business Free | BizBranches">
    <meta property="og:description" content="List your business FREE. Instant visibility, reach millions. No credit card required.">
    <meta property="og:url" content="https://bizbranches.pk/add.html">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Add Your Business",
      "description": "Free business listing submission form for Pakistan businesses",
      "url": "https://pakbizbranches.online/add.html"
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="page-header">
        <div class="container">
            <h1 class="page-title">List Your Company Free</h1>
            <p class="page-subtitle">Join 50,000+ companies on Pakistan's leading directory</p>
        </div>
    </section>

    <section class="section">
        <div class="container" style="max-width: 800px;">
            <form class="business-form">
                <div class="form-section">
                    <h3 class="form-section-title">Basic Information</h3>
                    <div class="form-group">
                        <label for="businessName">Business Name *</label>
                        <input type="text" id="businessName" required>
                    </div>
                    <div class="form-group">
                        <label for="contactPerson">Contact Person</label>
                        <input type="text" id="contactPerson">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email">
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Contact Details</h3>
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp Number</label>
                        <input type="tel" id="whatsapp">
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Location</h3>
                    <div class="form-group">
                        <label for="city">City *</label>
                        <select id="city" required>
                            <option value="">Select City</option>
                            <option>Karachi</option>
                            <option>Lahore</option>
                            <option>Islamabad</option>
                            <option>Rawalpindi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="address">Address *</label>
                        <textarea id="address" rows="3" required></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">Business Details</h3>
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option>Restaurants</option>
                            <option>Healthcare</option>
                            <option>Education</option>
                            <option>Retail</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Description *</label>
                        <textarea id="description" rows="5" required></textarea>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                    <i class="fas fa-check"></i> Submit Business Listing
                </button>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="loader.js"></script>
    <script src="script.js"></script>
</body>
</html>
