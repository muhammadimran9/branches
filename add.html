<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">

    <meta name="description" content="List your company FREE on Pakistan's #1 directory. Instant visibility, reach millions. Add restaurants, shops, services. No credit card needed.">
    <meta name="keywords" content="add business Pakistan, list business free Pakistan, business registration Pakistan, promote business online, free business listing, advertise business Pakistan">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pakbizbranhces.online/add.html">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <meta property="og:title" content="Add Your Business Free | BizBranches">
    <meta property="og:description" content="List your business FREE. Instant visibility, reach millions. No credit card required.">
    <meta property="og:url" content="https://pakbizbranhces.online/add.html">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Add Your Business",
      "description": "Free business listing submission form for Pakistan businesses",
      "url": "https://pakbizbranhces.online/add.html"
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"></noscript>
    <link rel="preload" href="styles.min.css" as="style">
    <link rel="stylesheet" href="styles.min.css">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" as="style">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" media="print" onload="this.media='all'">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="header-placeholder"></div>

    <main id="main-content">
    <section class="page-header">
        <div class="container">
            <h1 class="page-title">List Your Company Free</h1>
            <p class="page-subtitle">Join 50,000+ companies on Pakistan's leading directory</p>
        </div>
    </section>

    <section class="section">
        <div class="container" style="max-width: 800px;">
            <form class="business-form" aria-label="Business listing form">
                <div class="form-section">
                    <h2 class="form-section-title">Basic Information</h2>
                    <div class="form-group">
                        <label for="businessName">Business Name *</label>
                        <input type="text" id="businessName" name="businessName" required aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="contactPerson">Contact Person</label>
                        <input type="text" id="contactPerson" name="contactPerson">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" autocomplete="email">
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="form-section-title">Contact Details</h2>
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required aria-required="true" autocomplete="tel">
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp Number</label>
                        <input type="tel" id="whatsapp" name="whatsapp" autocomplete="tel">
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="form-section-title">Location</h2>
                    <div class="form-group">
                        <label for="city">City *</label>
                        <select id="city" name="city" required aria-required="true">
                            <option value="">Select City</option>
                            <option value="Karachi">Karachi</option>
                            <option value="Lahore">Lahore</option>
                            <option value="Islamabad">Islamabad</option>
                            <option value="Rawalpindi">Rawalpindi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="address">Address *</label>
                        <textarea id="address" name="address" rows="3" required aria-required="true"></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="form-section-title">Business Details</h2>
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" name="category" required aria-required="true">
                            <option value="">Select Category</option>
                            <option value="Restaurants">Restaurants</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Retail">Retail</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Description *</label>
                        <textarea id="description" name="description" rows="5" required aria-required="true"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="logo">Business Logo (Max 200KB) *</label>
                        <input type="file" id="logo" name="logo" accept="image/jpeg,image/png,image/webp" required aria-required="true" aria-describedby="logo-help">
                        <small id="logo-help" style="color: #666; display: block; margin-top: 5px;">Upload your business logo (JPG, PNG, WebP, max 200KB)</small>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;" aria-label="Submit business listing">
                    <i class="fas fa-check" aria-hidden="true"></i> Submit Business Listing
                </button>
            </form>
        </div>
    </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="loader.js" defer></script>
    <script src="script.js" defer></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1dRJtLFMhBqieIj6JrtZsd4j0jd1xM_Y",
            authDomain: "branches-app-ff0a2.firebaseapp.com",
            projectId: "branches-app-ff0a2",
            storageBucket: "branches-app-ff0a2.appspot.com",
            messagingSenderId: "817543103901",
            appId: "1:817543103901:web:0f1de5eacc949505dc9b74"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        document.getElementById('logo').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.size > 200 * 1024) {
                alert('❌ Logo must be less than 200KB');
                e.target.value = '';
            }
        });

        document.querySelector('.business-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button[type="submit"]');
            const logoFile = document.getElementById('logo').files[0];
            
            if (!logoFile) {
                alert('❌ Please upload a logo');
                return;
            }
            
            if (logoFile.size > 200 * 1024) {
                alert('❌ Logo must be less than 200KB');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Uploading...';

            try {
                const logoRef = ref(storage, `logos/${Date.now()}_${logoFile.name}`);
                await uploadBytes(logoRef, logoFile);
                const logoURL = await getDownloadURL(logoRef);

                await addDoc(collection(db, "businesses"), {
                    businessName: document.getElementById('businessName').value,
                    contactPerson: document.getElementById('contactPerson').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    city: document.getElementById('city').value,
                    address: document.getElementById('address').value,
                    category: document.getElementById('category').value,
                    description: document.getElementById('description').value,
                    logoURL: logoURL,
                    createdAt: serverTimestamp(),
                    status: 'pending'
                });

                alert('✅ Business submitted successfully!');
                e.target.reset();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check" aria-hidden="true"></i> Submit Business Listing';
        });
    </script>
</body>
</html>
