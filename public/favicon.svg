<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#0f2b3d" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- Building with directory pages -->
  <g transform="translate(16, 16)">
    <!-- Building structure -->
    <rect x="-8" y="-10" width="16" height="20" fill="#60a5fa" rx="1"/>
    
    <!-- Directory pages lines -->
    <rect x="-6" y="-8" width="12" height="1" fill="#ffffff"/>
    <rect x="-6" y="-5" width="12" height="1" fill="#ffffff"/>
    <rect x="-6" y="-2" width="12" height="1" fill="#ffffff"/>
    <rect x="-6" y="1" width="12" height="1" fill="#ffffff"/>
    <rect x="-6" y="4" width="12" height="1" fill="#ffffff"/>
    <rect x="-6" y="7" width="12" height="1" fill="#ffffff"/>
    
    <!-- Center spine -->
    <rect x="-1" y="-10" width="2" height="20" fill="#0f2b3d"/>
    
    <!-- Door -->
    <rect x="2" y="4" width="3" height="6" fill="#ffffff"/>
  </g>
  
  <!-- Small accent dots -->
  <circle cx="6" cy="6" r="1" fill="#ffffff"/>
  <circle cx="26" cy="6" r="1" fill="#ffffff"/>
</svg>
