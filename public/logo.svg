<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background shape -->
  <rect width="200" height="60" rx="8" fill="#0f2b3d"/>
  
  <!-- Building icon -->
  <g transform="translate(15, 15)">
    <!-- Main building -->
    <rect x="0" y="10" width="20" height="25" fill="#60a5fa"/>
    <!-- Windows -->
    <rect x="2" y="12" width="3" height="3" fill="#ffffff"/>
    <rect x="7" y="12" width="3" height="3" fill="#ffffff"/>
    <rect x="12" y="12" width="3" height="3" fill="#ffffff"/>
    <rect x="2" y="17" width="3" height="3" fill="#ffffff"/>
    <rect x="7" y="17" width="3" height="3" fill="#ffffff"/>
    <rect x="12" y="17" width="3" height="3" fill="#ffffff"/>
    <rect x="2" y="22" width="3" height="3" fill="#ffffff"/>
    <rect x="7" y="22" width="3" height="3" fill="#ffffff"/>
    <rect x="12" y="22" width="3" height="3" fill="#ffffff"/>
    <!-- Door -->
    <rect x="8" y="28" width="4" height="7" fill="#ffffff"/>
  </g>
  
  <!-- Text: PakBiz -->
  <text x="45" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">PakBiz</text>
  
  <!-- Text: Branches -->
  <text x="45" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#60a5fa">Branches</text>
  
  <!-- Location pin icon -->
  <g transform="translate(160, 20)">
    <circle cx="10" cy="10" r="8" fill="#60a5fa"/>
    <circle cx="10" cy="10" r="3" fill="#ffffff"/>
    <path d="M10,18 C10,18 10,22 10,22" stroke="#60a5fa" stroke-width="2" fill="none"/>
  </g>
</svg>
